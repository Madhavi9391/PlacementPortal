<!DOCTYPE html>
<html>
<head>
    <title>Company Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<nav>
    <a href="index.html">Home</a>
    <a href="student-login.html">Student Login</a>
    <a href="company-login.html">Company Login</a>
</nav>

<h2>Company Registration</h2>

<input type="text" id="companyName" placeholder="Company Name"><br><br>

<input type="email" id="email" placeholder="Email"><br><br>

<input type="password" id="password" placeholder="Password"><br><br>
<input type="text" id="location" placeholder="Location"><br><br>

<button onclick="registerCompany()">
    Register
</button>

<script>

    function registerCompany(){

        fetch('/api/companies/register',{

            method:'POST',

            headers:{
                'Content-Type':'application/json'
            },

            body:JSON.stringify({

                companyName:
                document.getElementById('companyName').value,

                email:
                document.getElementById('email').value,

                password:
                document.getElementById('password').value,
                location:
                document.getElementById('location').value

            })

        })

            .then(response=>response.json())

            .then(data=>{

                alert("Company Registered Successfully");

            })

            .catch(error=>{

                console.log(error);

            });

    }

</script>

</body>
</html>
