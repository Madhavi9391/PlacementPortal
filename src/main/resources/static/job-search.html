<!DOCTYPE html><html><head>
    <title>Job Search</title>
    <link rel="stylesheet" href="style.css">
</head><body><nav>
    <h2>Placement Portal</h2><a href="student-dashboard.html">Dashboard</a>
<a href="job-search.html">Jobs</a>
<a href="profile.html">Profile</a>
<a href="my-applications.html">My Applications</a>
<a href="index.html">Logout</a>

</nav><h1>Available Jobs</h1><div id="jobsContainer" class="jobs">
</div><script>

let container = document.getElementById("jobsContainer");
let jobs = [];

fetch('/api/jobs')
    .then(response => response.json())
    .then(data => {

        jobs = data;

        data.forEach(job => {

            container.innerHTML += `

            <div class="job-card">

                <h2>${job.jobTitle}</h2>

                <p><b>Company:</b> ${job.companyName}</p>

                <p><b>Salary:</b> ${job.salary}</p>

                <p><b>Location:</b> ${job.location}</p>

                <button onclick="applyJob(${job.id})">
                    Apply
                </button>

            </div>

            `;
        });
    })
    .catch(error => {
        console.log(error);
    });

function applyJob(jobId) {

    let selectedJob = jobs.find(job => job.id === jobId);

    let email = localStorage.getItem("email");

    fetch('/api/applications/apply', {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({

            studentEmail: email,
            jobTitle: selectedJob.jobTitle,
            companyName: selectedJob.companyName,
            status: "Applied"

        })

    })

    .then(response => response.json())
    .then(data => {

        alert("Job Applied Successfully");

    })

    .catch(error => {

        console.log(error);

    });
}

</script></body>
</html>
